name = "quant-factors-factor-ideas"
main = "src/worker-main.js"
compatibility_date = "2024-12-01"

[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true

[[d1_databases]]
binding = "DB"
database_name = "quant-factors"
database_id = "e6ef3240-c301-455d-80aa-27e7b9b88192"
migrations_dir = "migrations"

[vars]
MAX_IDEAS = "3"
GITHUB_RAW_BASE = "https://raw.githubusercontent.com/ech09527/quant-factors/main"
# LLM 凭证改由 D1 llm_providers 管理；以下仅作未配置 D1 时的 fallback
OPENAI_MODEL = "glm-4-flash"
VALIDATION_BATCH_ENABLED = "0"
VALIDATION_BATCH_LIMIT = "10"
VALIDATION_STALE_RUNNING_MINUTES = "5"
VALIDATION_JUPYTER_SERVER_KEY = "lynas-pub"
KERNEL_CLEANUP_ENABLED = "1"
KERNEL_CLEANUP_LIMIT = "30"
KERNEL_CLEANUP_GRACE_MINUTES = "2"
KERNEL_ORPHAN_SWEEP_ENABLED = "1"
KERNEL_ORPHAN_SWEEP_LIMIT = "30"
KERNEL_ORPHAN_SWEEP_IDLE_MINUTES = "5"
KERNEL_RECONCILE_ENABLED = "1"
SAMPLE_START = "2023-01-01"
FACTOR_API_BASE_URL = "https://quant-factors-dashboard.pages.dev"
MLFLOW_EXPERIMENT_TEST_FACTOR_VALIDATION = "test-factor-validation"
TEST_FACTOR_VALIDATION_SKIP_MLFLOW = "1"
EXECUTION_BACKEND = "prefect"
PREFECT_WORK_POOL = "quant-factors-eval"
PREFECT_DEPLOYMENT_FACTOR_VALIDATION = "factor-validation/production"
PREFECT_DEPLOYMENT_TEST_FACTOR_VALIDATION = "test-factor-validation/production"
PREFECT_FLOW_RUN_STALE_MINUTES = "45"
PREFECT_API_URL = "https://prefect.longyin-tech.com/api"
JUPYTER_EXECUTION_VIA_DO = "0"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["JupyterServerCoordinator"]

[[migrations]]
tag = "v2"
deleted_classes = ["JupyterServerCoordinator"]

[triggers]
# 业务 submit（Prefect）/ 过期 server 清理：每 1 分钟；想法生成：每 5 分钟
crons = ["*/1 * * * *", "*/5 * * * *"]
