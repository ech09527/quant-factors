# Forwards issues / issue_comment events to the central ai-workflow repository.

name: Relay to AI Workflow

on:
  issues:
    types: [opened, closed]
  issue_comment:
    types: [created]

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Filter supported actions
        id: filter
        run: |
          case "${{ github.event_name }}.${{ github.event.action }}" in
            issues.opened|issues.closed|issue_comment.created)
              echo "forward=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "forward=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Dispatch to ai-workflow
        if: steps.filter.outputs.forward == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.AI_WORKFLOW_DISPATCH_TOKEN }}
          repository: ech09527/ai-workflow
          event-type: issue_event
          client-payload: |
            {
              "schema_version": 1,
              "source": "workflow_forward",
              "github_event": "${{ github.event_name == 'issue_comment' && 'issue_comment' || 'issues' }}",
              "action": "${{ github.event.action }}",
              "delivery_id": "${{ github.run_id }}-${{ github.run_attempt }}",
              "sent_at": "${{ github.event.repository.updated_at }}",
              "repository": {
                "id": ${{ github.event.repository.id }},
                "name": "${{ github.event.repository.name }}",
                "full_name": "${{ github.event.repository.full_name }}",
                "owner": { "login": "${{ github.event.repository.owner.login }}" },
                "default_branch": "${{ github.event.repository.default_branch }}",
                "clone_url": "${{ github.event.repository.clone_url }}",
                "html_url": "${{ github.event.repository.html_url }}"
              },
              "issue": {
                "number": ${{ github.event.issue.number }},
                "title": ${{ toJson(github.event.issue.title) }},
                "body": ${{ toJson(github.event.issue.body || '') }},
                "state": "${{ github.event.issue.state }}",
                "user": { "login": "${{ github.event.issue.user.login }}" },
                "labels": ${{ toJson(github.event.issue.labels) }},
                "assignees": ${{ toJson(github.event.issue.assignees) }},
                "html_url": "${{ github.event.issue.html_url }}",
                "created_at": "${{ github.event.issue.created_at }}",
                "updated_at": "${{ github.event.issue.updated_at }}"
              },
              "comment": ${{ github.event_name == 'issue_comment' && toJson(github.event.comment) || 'null' }},
              "sender": { "login": "${{ github.event.sender.login }}" }
            }
