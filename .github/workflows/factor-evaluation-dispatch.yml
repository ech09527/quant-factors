# 工作流 C-Dispatch：扫描待评估想法，一次性批量运行 factor evaluation

name: Factor Evaluation Dispatch

on:
  workflow_dispatch:
    inputs:
      max_ideas:
        description: 单次最多评估条数（0 表示不限制）
        required: false
        default: "5"
        type: string
      sample_start:
        description: 样本起始日
        required: false
        default: "2023-01-01"
        type: string
      force:
        description: 强制重评（true/false）
        required: false
        default: "false"
        type: string
  schedule:
    - cron: "*/15 * * * *"
  workflow_run:
    workflows: ["Factor Ideas"]
    types: [completed]

concurrency:
  group: factor-evaluation-dispatch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  evaluate-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GITHUB_TOKEN: ${{ secrets.PROJECT_PAT || secrets.GITHUB_TOKEN }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      KAGGLE_KERNEL_SLUG: evaluate-factor-idea
      SAMPLE_START: ${{ inputs.sample_start || '2023-01-01' }}
      FORCE: ${{ inputs.force || 'false' }}
      MAX_IDEAS: ${{ inputs.max_ideas || '5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt pyyaml kaggle duckdb pandas numpy jinja2

      - name: Configure Kaggle credentials
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -n "${KAGGLE_API_TOKEN}" ]; then
            echo "使用 KAGGLE_API_TOKEN 认证"
          elif [ -n "${KAGGLE_USERNAME}" ] && [ -n "${KAGGLE_KEY}" ]; then
            mkdir -p ~/.kaggle
            echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_KEY}\"}" > ~/.kaggle/kaggle.json
            chmod 600 ~/.kaggle/kaggle.json
          else
            echo "::error::需要配置 KAGGLE_API_TOKEN 或 KAGGLE_USERNAME + KAGGLE_KEY"
            exit 1
          fi

      - name: Fetch ideas and pending list
        run: |
          export GITHUB_PROJECT_ID=$(jq -r .id config/github-project.json)
          python scripts/fetch_existing_ideas.py -o /tmp/all_ideas.json
          python scripts/fetch_pending_evaluations.py \
            --ideas /tmp/all_ideas.json \
            -o /tmp/pending.json

      - name: Setup Cursor auth
        env:
          CURSOR_AUTH_JSON: ${{ secrets.CURSOR_AUTH_JSON }}
        run: bash scripts/setup_cursor_auth.sh

      - name: Batch translate and evaluate pending ideas
        env:
          CURSOR_TIMEOUT_SECONDS: "900"
          TRANSLATION_MAX_ATTEMPTS: "5"
          KERNEL_LOG_TIMEOUT_SECONDS: "7200"
          CURSOR_WORKERS: "2"
        run: |
          COUNT=$(jq '.count' /tmp/pending.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "无待评估想法"
            exit 0
          fi
          ARGS=(--pending /tmp/pending.json -o /tmp/batch_result.json --sample-start "${SAMPLE_START}")
          if [ "${MAX_IDEAS}" != "0" ]; then
            ARGS+=(--max-ideas "${MAX_IDEAS}")
          fi
          if [ "${FORCE}" = "true" ]; then
            ARGS+=(--force)
          fi
          python scripts/run_batch_factor_evaluation.py "${ARGS[@]}"
