# 工作流 B：Runner 纯脚本编排；Kaggle Kernel 内 Cursor 探索数据并生成因子想法。

name: Factor Ideas

on:
  workflow_dispatch:
    inputs:
      max_ideas:
        description: 生成想法数量
        required: false
        default: "3"
        type: string
      dataset_slug:
        description: "可选：指定数据集 slug（owner/dataset-name）"
        required: false
        type: string
      mode:
        description: "explore_and_generate 或 generate_only"
        required: false
        default: "explore_and_generate"
        type: string
  # schedule:
  #   - cron: "0 2 * * 1"

concurrency:
  group: factor-ideas
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITHUB_TOKEN: ${{ secrets.PROJECT_PAT || secrets.GITHUB_TOKEN }}
      KAGGLE_KERNEL_SLUG: generate-factor-ideas
      MAX_IDEAS: ${{ inputs.max_ideas || '3' }}
      KERNEL_MODE: ${{ inputs.mode || 'explore_and_generate' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt pyyaml kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -n "${KAGGLE_API_TOKEN}" ]; then
            echo "使用 KAGGLE_API_TOKEN 认证"
          elif [ -n "${KAGGLE_USERNAME}" ] && [ -n "${KAGGLE_KEY}" ]; then
            mkdir -p ~/.kaggle
            echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_KEY}\"}" > ~/.kaggle/kaggle.json
            chmod 600 ~/.kaggle/kaggle.json
          else
            echo "::error::需要配置 KAGGLE_API_TOKEN 或 KAGGLE_USERNAME + KAGGLE_KEY"
            exit 1
          fi

      - name: Fetch existing ideas
        run: |
          export GITHUB_PROJECT_ID=$(jq -r .id config/github-project.json)
          python scripts/fetch_existing_ideas.py -o /tmp/existing.json

      - name: Run Kaggle factor ideas pipeline
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          CURSOR_AUTH_JSON: ${{ secrets.CURSOR_AUTH_JSON }}
          KERNEL_LOG_TIMEOUT_SECONDS: "6600"
        run: |
          ARGS=(--existing /tmp/existing.json --max-ideas "${MAX_IDEAS}" --mode "${KERNEL_MODE}")
          if [ -n "${{ inputs.dataset_slug }}" ]; then
            ARGS+=(--slug "${{ inputs.dataset_slug }}")
          fi
          export GITHUB_PROJECT_ID=$(jq -r .id config/github-project.json)
          python scripts/run_factor_ideas.py "${ARGS[@]}"
