name: quant-factors-prefect
prefect-version: '>=3.0.0'
pull:
- prefect.deployments.steps.git_clone:
    id: clone-quant-factors
    repository: git@github.com:ech09527/quant-factors.git
    branch: main
- prefect.deployments.steps.set_working_directory:
    directory: '{{ clone-quant-factors.directory }}/prefect'
deployments:
- name: production
  tags:
  - quant-factors
  - factor-validation
  description: 执行单条 factor_validation 并回写 Worker。
  entrypoint: flows/factor_validation.py:run_factor_validation
  work_pool:
    name: quant-factors-eval
- name: production
  tags:
  - quant-factors
  - neutral-validation
  description: 中性化二次验证（claim + LLM 选型 + 评估 + 回写 D1）。
  entrypoint: flows/neutral_validation.py:run_neutral_validation
  work_pool:
    name: neutral_validation
  parameters:
    ignore_schedule_enabled: false
    callback_base_url: https://quant-factors-dashboard.pages.dev
  job_variables:
    env:
      FACTOR_API_BASE_URL: https://quant-factors-dashboard.pages.dev
      VALIDATION_API_BASE_URL: https://quant-factors-dashboard.pages.dev
  schedules:
  - cron: '*/5 * * * *'
    timezone: Asia/Shanghai
    active: true
